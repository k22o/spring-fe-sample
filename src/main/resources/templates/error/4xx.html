<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::link}, ~{::main})}">
<head>
    <title>リクエストエラー</title>
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>
<body>
<main class="container error-page">
    <p class="error-code" th:text="${status}">4xx</p>
    <h1>リクエストを処理できませんでした</h1>
    <p>入力内容やURLをご確認のうえ、再度お試しください。</p>
    <a th:href="@{/}" class="back-link">トップページに戻る</a>
</main>
</body>
</html>

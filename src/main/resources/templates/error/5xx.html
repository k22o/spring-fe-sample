<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::link}, ~{::main})}">
<head>
    <title>サーバーエラー</title>
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>
<body>
<main class="container error-page">
    <p class="error-code" th:text="${status}">5xx</p>
    <h1>サーバーエラーが発生しました</h1>
    <p>時間をおいて再度お試しください。問題が続く場合は管理者へお問い合わせください。</p>
    <a th:href="@{/}" class="back-link">トップページに戻る</a>
</main>
</body>
</html>
